<html lang="zh-CN">
<head>

<style>

.btn { display: inline-block; padding: 10px 20px; background: #111; color: white; border-radius: 8px; text-decoration: none; }
h1 { font-size: 28px; margin-bottom: 8px; }
p { color: #666; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
<h1>欢迎使用编辑器</h1>
<p>这是一个测试卡片组件，用来验证编辑器的各项功能。</p>
<a class="btn" href="#">了解更多</a>
</div>
<div class="card">
<h1>第二个组件</h1>
<p>用于测试拖拽排序和组件树功能。</p>
</div>

</html>
